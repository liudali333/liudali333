name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"  # 每6小时自动运行
  workflow_dispatch:       # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=#0D1117,#161B22,#30363D,#58A6FF,#BC8CFF,#E03978
            dist/github-snake-light.svg?palette=#ffffff,#f6f8fa,#e1e4e8,#58A6FF,#BC8CFF,#E03978

      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
